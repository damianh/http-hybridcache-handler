name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore http-lib.slnx

    - name: Build
      run: dotnet build http-lib.slnx --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet run --project structured-field-values/test/Http.StructuredFieldValues.Tests/Http.StructuredFieldValues.Tests.csproj --no-build --configuration Release
        dotnet run --project signatures/test/Http.HttpSignatures.Tests/Http.HttpSignatures.Tests.csproj --no-build --configuration Release
        dotnet run --project hybrid-cache-handler/test/HttpHybridCacheHandler.Tests/HttpHybridCacheHandler.Tests.csproj --no-build --configuration Release
        dotnet run --project file-distributed-cache/test/FileDistributedCache.Tests/FileDistributedCache.Tests.csproj --no-build --configuration Release

    - name: Run benchmarks
      run: |
        cd hybrid-cache-handler/benchmarks/Benchmarks
        dotnet run --project Benchmarks.csproj --configuration Release --no-build -- --exporters json
      continue-on-error: true

    - name: Add benchmark results to summary
      if: always()
      run: |
        echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
        if [ -f "hybrid-cache-handler/benchmarks/Benchmarks/BenchmarkDotNet.Artifacts/results/Benchmarks-report.json" ]; then
          echo "Benchmark completed successfully. Full results available in artifacts." >> $GITHUB_STEP_SUMMARY
        else
          echo "Benchmark execution completed with warnings or errors." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: hybrid-cache-handler/benchmarks/Benchmarks/BenchmarkDotNet.Artifacts/
        if-no-files-found: ignore

    - name: Build NuGet packages
      run: |
        dotnet pack structured-field-values/src/Http.StructuredFieldValues/Http.StructuredFieldValues.csproj --no-build --configuration Release --output ./packages
        dotnet pack signatures/src/Http.HttpSignatures/Http.HttpSignatures.csproj --no-build --configuration Release --output ./packages
        dotnet pack hybrid-cache-handler/src/HttpHybridCacheHandler/HttpHybridCacheHandler.csproj --no-build --configuration Release --output ./packages
        dotnet pack file-distributed-cache/src/FileDistributedCache/FileDistributedCache.csproj --no-build --configuration Release --output ./packages

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg

    - name: Add build summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Tests executed" >> $GITHUB_STEP_SUMMARY
        echo "✅ NuGet packages created" >> $GITHUB_STEP_SUMMARY
